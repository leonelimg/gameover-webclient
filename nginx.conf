server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Electron updater files: serve only real files and never fallback to SPA index.
    location ^~ /updates/print-bridge/ {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    # React Router — always serve index.html for non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy public upload requests (e.g. announcement images) to backend
    location ^~ /public/ {
        proxy_pass http://api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
