version: "3.9"

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gameover-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gameover
      POSTGRES_PASSWORD: gameover
      POSTGRES_DB: gameover
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gameover"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API Server ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gameover-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://gameover:gameover@postgres:5432/gameover?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-refresh-in-production}
      JWT_REFRESH_EXPIRY: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Frontend (Vite preview) ─────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: gameover-web
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
